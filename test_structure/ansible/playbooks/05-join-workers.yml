---
- name: Generate fresh worker join command
  hosts: k8s_first_control
  become: true
  tasks:
    - name: Create worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: worker_join_command
      changed_when: false

    - name: Save worker join fact
      ansible.builtin.set_fact:
        worker_join_command_final: "{{ worker_join_command.stdout }} --cri-socket {{ containerd_socket }}"

- name: Join worker nodes
  hosts: k8s_workers
  become: true
  roles:
    - kubeadm_join_worker