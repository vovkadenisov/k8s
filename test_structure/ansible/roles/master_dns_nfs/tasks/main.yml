---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ master_hostname }}"

- name: Ensure hostname is present in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    line: "127.0.1.1 {{ master_hostname }}.{{ dns_domain }} {{ master_hostname }}"
    state: present

- name: Install DNS and NFS packages
  ansible.builtin.apt:
    name:
      - bind9
      - bind9utils
      - dnsutils
      - nfs-kernel-server
      - nfs-common
      - qemu-guest-agent
      - curl
      - vim
      - htop
    state: present
    update_cache: true

- name: enable qemu guest agent
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
    enabled: true
    
- name: Create BIND zones directory
  ansible.builtin.file:
    path: /etc/bind/zones
    state: directory
    owner: root
    group: bind
    mode: "0755"

- name: Render BIND options
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Render BIND local zones config
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Render forward DNS zone
  ansible.builtin.template:
    src: db.forward.j2
    dest: "/etc/bind/zones/db.{{ dns_domain }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Render reverse DNS zone
  ansible.builtin.template:
    src: db.reverse.j2
    dest: "/etc/bind/zones/db.{{ dns_reverse_zone }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Validate BIND config
  ansible.builtin.command: named-checkconf
  changed_when: false

- name: Validate forward zone
  ansible.builtin.command: "named-checkzone {{ dns_domain }} /etc/bind/zones/db.{{ dns_domain }}"
  changed_when: false

- name: Validate reverse zone
  ansible.builtin.command: "named-checkzone {{ dns_reverse_zone }} /etc/bind/zones/db.{{ dns_reverse_zone }}"
  changed_when: false

- name: Enable and start bind9
  ansible.builtin.service:
    name: bind9
    state: started
    enabled: true


- name: Create NFS export root
  ansible.builtin.file:
    path: "{{ nfs_export_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Kubernetes NFS export directory
  ansible.builtin.file:
    path: "{{ nfs_k8s_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

- name: Render NFS exports config
  ansible.builtin.template:
    src: nfs.exports.j2
    dest: /etc/exports.d/k8s.exports
    owner: root
    group: root
    mode: "0644"
  notify: Reload nfs exports

- name: Enable and start NFS server
  ansible.builtin.service:
    name: nfs-server
    state: started
    enabled: true