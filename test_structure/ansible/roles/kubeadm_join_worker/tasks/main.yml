---
- name: Check if worker already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Join worker node
  ansible.builtin.command: "{{ hostvars[groups['k8s_first_control'][0]].worker_join_command_final }}"
  when: not kubelet_conf.stat.exists
  register: join_worker_result

- name: Print worker join output
  ansible.builtin.debug:
    var: join_worker_result.stdout_lines
  when: join_worker_result is defined and join_worker_result.stdout_lines is defined