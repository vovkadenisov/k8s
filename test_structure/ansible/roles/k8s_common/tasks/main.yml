---
- name: Set hostname to inventory short name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname_short }}"

- name: Ensure /etc/hosts contains local hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    line: "127.0.1.1 {{ inventory_hostname }} {{ inventory_hostname_short }}"
    state: present

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - gnupg
      - lsb-release
      - software-properties-common
      - bash-completion
      - python3
      - tar
      - chrony
      - nfs-common
      - qemu-guest-agent
      - jq
      - vim
      - git
      - ipset
      - ipvsadm
      - conntrack
      - socat
      - ebtables
      - ethtool
      - arptables
    state: present
    update_cache: true

- name: Enable qemu guest agent
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
    enabled: true

- name: Enable chrony
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Load kernel modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
    - ip_vs
    - ip_vs_rr
    - ip_vs_wrr
    - ip_vs_sh
    - nf_conntrack

- name: Persist Kubernetes/IPVS kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      overlay
      br_netfilter
      ip_vs
      ip_vs_rr
      ip_vs_wrr
      ip_vs_sh
      nf_conntrack

- name: Configure Kubernetes sysctl params
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_nonlocal_bind = 1

- name: Apply sysctl params
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Ensure systemd-resolved drop-in dir exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure persistent DNS for lab domain
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/onikdam-local.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Resolve]
      DNS={{ lab_dns_server }}
      Domains=~{{ lab_dns_domain }}
      MulticastDNS=no
  notify: Restart systemd-resolved

- name: Install containerd
  ansible.builtin.apt:
    name:
      - containerd
    state: present
    update_cache: true

- name: Create containerd config dir
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable SystemdCgroup in containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: true

- name: Configure crictl
  ansible.builtin.copy:
    dest: /etc/crictl.yaml
    owner: root
    group: root
    mode: "0644"
    content: |
      runtime-endpoint: "unix:///run/containerd/containerd.sock"
      image-endpoint: "unix:///run/containerd/containerd.sock"
      timeout: 10
      debug: false
      pull-image-on-create: false
      disable-pull-on-run: false

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Kubernetes apt key
  ansible.builtin.shell: |
    set -e
    curl -fsSL {{ kubernetes_apt_key_url }} | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    owner: root
    group: root
    mode: "0644"
    content: |
      {{ kubernetes_apt_repo }}

- name: Install kubeadm kubelet kubectl
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Configure kubelet node ip
  ansible.builtin.copy:
    dest: /etc/default/kubelet
    owner: root
    group: root
    mode: "0644"
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ k8s_node_ip }}
  notify: Restart kubelet

- name: Enable kubelet
  ansible.builtin.service:
    name: kubelet
    enabled: true
